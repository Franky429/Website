<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: white;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.35), transparent 70%);
      top: -200px;
      right: -200px;
      filter: blur(40px);
    }

    .glow2 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(168,85,247,0.25), transparent 70%);
      bottom: -180px;
      left: -180px;
      filter: blur(40px);
    }

    .card {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 720px;
      padding: 60px;
      border-radius: 28px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
      text-align: center;
      animation: fadeIn 1s ease;
    }

    .badge {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 28px;
      font-size: 14px;
      color: #cbd5e1;
    }

    h1 {
      font-size: clamp(48px, 8vw, 72px);
      margin-bottom: 24px;
      line-height: 1;
    }

    p {
      color: #cbd5e1;
      font-size: 18px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .button {
      display: inline-block;
      padding: 16px 28px;
      border-radius: 14px;
      background: white;
      color: #111827;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .button:hover {
      transform: translateY(-3px);
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media(max-width: 640px) {
      .card {
        padding: 40px 24px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="card">

    <div class="badge">
      🚀 Neue Website entsteht
    </div>

    <h1>Coming Soon</h1>

    <p>
      Unsere neue Website befindet sich aktuell im Aufbau.
      Schon bald findest du hier spannende Inhalte, Projekte und mehr.
    </p>

    <a href="mailto:info@deinedomain.de" class="button">
      Kontakt aufnehmen
    </a>

    <div class="footer">
      © 2026 Deine Firma · Alle Rechte vorbehalten
    </div>

  </div>

</body>
</html>
